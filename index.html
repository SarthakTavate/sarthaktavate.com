/* Base reveal: subtle fade + upward motion */
.reveal {
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 600ms cubic-bezier(.2,.9,.2,1), transform 600ms cubic-bezier(.2,.9,.2,1);
  will-change: opacity, transform;
  visibility: hidden;
}

/* When element becomes visible */
.reveal.in-view {
  opacity: 1;
  transform: translateY(0);
  visibility: visible;
}

/* Stagger container: add class "reveal-stagger" to a container to stagger its children */
.reveal-stagger > * {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 520ms ease, transform 520ms ease;
  will-change: opacity, transform;
  visibility: hidden;
}
.reveal-stagger.in-view > * {
  visibility: visible;
}
.reveal-stagger.in-view > *:nth-child(1){ transition-delay: 0ms; }
.reveal-stagger.in-view > *:nth-child(2){ transition-delay: 80ms; }
.reveal-stagger.in-view > *:nth-child(3){ transition-delay: 160ms; }
.reveal-stagger.in-view > *:nth-child(4){ transition-delay: 240ms; }

/* Accessibility: if user prefers reduced motion, reveal classes will be applied immediately by JS */
@media (prefers-reduced-motion: reduce) {
  .reveal, .reveal-stagger > * { transition: none !important; transform: none !important; opacity: 1 !important; visibility: visible !important; }
}

  <!-- Scroll reveal script (inline) -->
  <script>
  (function () {
    // Respect prefers-reduced-motion
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      // If reduced motion is preferred, reveal everything immediately (no animation)
      document.querySelectorAll('.reveal, .reveal-stagger').forEach(function (el) {
        el.classList.add('in-view');
      });
      return;
    }

    // IntersectionObserver options
    var ioOptions = {
      root: null,
      rootMargin: '0px 0px -8% 0px', // trigger slightly before bottom
      threshold: 0.06
    };

    var observer = new IntersectionObserver(function (entries, obs) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
          obs.unobserve(entry.target); // one-time reveal
        }
      });
    }, ioOptions);

    // Auto-attach reveal class to sensible targets while preserving markup
    // Targets: major blocks, images, headings, paragraphs, buttons
    var selectorList = [
      '.row .block',
      '.row .image img',
      '.row h1',
      '.row h3',
      '.row p',
      '.row .button',
      '.row .menu' // keep header menu visible but not animated (we'll skip row-1)
    ];

    // Build a NodeList of unique elements to observe
    var targets = new Set();
    selectorList.forEach(function (sel) {
      document.querySelectorAll(sel).forEach(function (el) {
        // Skip header row (row-1) so sticky header remains unchanged
        if (el.closest('.row-1')) return;
        targets.add(el);
      });
    });

    // Add reveal class and observe
    targets.forEach(function (el) {
      // Avoid interfering with inline styles; only add class
      el.classList.add('reveal');
      observer.observe(el);
    });

    // Optional: allow manual staggering by adding class "reveal-stagger" to a container in your markup.
    // Example: <div class="row row-5 reveal-stagger"> ... </div>
    // The CSS above will stagger children automatically when the container gets .in-view.

    // Small performance safeguard: if IntersectionObserver isn't supported, reveal everything
    if (!('IntersectionObserver' in window)) {
      document.querySelectorAll('.reveal, .reveal-stagger').forEach(function (el) {
        el.classList.add('in-view');
      });
    }
  })();
  </script>
